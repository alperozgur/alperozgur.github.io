<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS PDF Merger</title>
</head>
<body>
    <h1>RSS PDF Merger</h1>

    <label for="rssContentInput">Paste RSS Content:</label>
    <textarea id="rssContentInput" rows="10" cols="50" placeholder="Paste RSS content here"></textarea>
    <button onclick="parseRSS()">Parse and Display Links</button>
    <div id="links"></div>

    <script>
        // Function to parse RSS content and display PDF links
        function parseRSS() {
            const rssContent = document.getElementById('rssContentInput').value;

            // Function to parse links from the RSS content
            function parseRSSLinks(xml) {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xml, 'text/xml');
                const items = xmlDoc.getElementsByTagName('item');
                const links = [];

                for (let i = 0; i < items.length; i++) {
                    const title = items[i].getElementsByTagName('title')[0].textContent;
                    const link = items[i].getElementsByTagName('link')[0].textContent;
                    links.push({ title, link });
                }

                return links;
            }

            // Display PDF links
            const linksContainer = document.getElementById('links');
            linksContainer.innerHTML = '';

            const links = parseRSSLinks(rssContent);
            links.forEach((item, index) => {
                const linkElement = document.createElement('p');
                linkElement.innerHTML = `<strong>${item.title}</strong>: <a href="${item.link}" download="${item.title}.pdf">Download</a>`;
                linksContainer.appendChild(linkElement);
            });
        }
    </script>
</body>
</html>
