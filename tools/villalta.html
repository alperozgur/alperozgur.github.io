<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villalta Score Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        #resultCard {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header text-center">
                        <h1>Villalta Score Calculator</h1>
                    </div>
                    <div class="card-body">
                        <form id="villaltaForm">
                            <!-- Symptoms Section -->
                            <h5>Symptoms</h5>
                            <div class="mb-3">
                                <label for="pain" class="form-label">Pain (0-3)</label>
                                <input type="number" class="form-control" id="pain" placeholder="0-3" min="0" max="3" required>
                            </div>

                            <div class="mb-3">
                                <label for="cramps" class="form-label">Cramps (0-3)</label>
                                <input type="number" class="form-control" id="cramps" placeholder="0-3" min="0" max="3" required>
                            </div>

                            <div class="mb-3">
                                <label for="heaviness" class="form-label">Heaviness (0-3)</label>
                                <input type="number" class="form-control" id="heaviness" placeholder="0-3" min="0" max="3" required>
                            </div>

                            <div class="mb-3">
                                <label for="paresthesia" class="form-label">Paresthesia (0-3)</label>
                                <input type="number" class="form-control" id="paresthesia" placeholder="0-3" min="0" max="3" required>
                            </div>

                            <div class="mb-3">
                                <label for="pruritus" class="form-label">Pruritus (0-3)</label>
                                <input type="number" class="form-control" id="pruritus" placeholder="0-3" min="0" max="3" required>
                            </div>

                            <!-- Signs Section -->
                            <h5>Signs</h5>
                            <div class="mb-3">
                                <label for="edema" class="form-label">Edema (0-3)</label>
                                <input type="number" class="form-control" id="edema" placeholder="0-3" min="0" max="3" required>
                            </div>

                            <div class="mb-3">
                                <label for="skinPigmentation" class="form-label">Skin Pigmentation (0-3)</label>
                                <input type="number" class="form-control" id="skinPigmentation" placeholder="0-3" min="0" max="3" required>
                            </div>

                            <div class="mb-3">
                                <label for="venousEctasia" class="form-label">Venous Ectasia (0-3)</label>
                                <input type="number" class="form-control" id="venousEctasia" placeholder="0-3" min="0" max="3" required>
                            </div>

                            <div class="mb-3">
                                <label for="induration" class="form-label">Induration (0-3)</label>
                                <input type="number" class="form-control" id="induration" placeholder="0-3" min="0" max="3" required>
                            </div>

                            <div class="mb-3">
                                <label for="redness" class="form-label">Redness (0-3)</label>
                                <input type="number" class="form-control" id="redness" placeholder="0-3" min="0" max="3" required>
                            </div>

                            <button type="button" class="btn btn-primary w-100" onclick="calculateVillalta()">Calculate Villalta Score</button>
                        </form>

                        <div class="mt-4">
                            <div id="resultCard" class="card text-center d-none">
                                <div id="result" class="card-body fw-bold"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateVillalta() {
            // Get symptom and sign scores from the form
            let pain = parseInt(document.getElementById('pain').value);
            let cramps = parseInt(document.getElementById('cramps').value);
            let heaviness = parseInt(document.getElementById('heaviness').value);
            let paresthesia = parseInt(document.getElementById('paresthesia').value);
            let pruritus = parseInt(document.getElementById('pruritus').value);
            let edema = parseInt(document.getElementById('edema').value);
            let skinPigmentation = parseInt(document.getElementById('skinPigmentation').value);
            let venousEctasia = parseInt(document.getElementById('venousEctasia').value);
            let induration = parseInt(document.getElementById('induration').value);
            let redness = parseInt(document.getElementById('redness').value);

            // Calculate total Villalta score
            let score = pain + cramps + heaviness + paresthesia + pruritus + edema + skinPigmentation + venousEctasia + induration + redness;

            // Get the result card and text
            let resultCard = document.getElementById('resultCard');
            let resultText = document.getElementById('result');

            // Display result based on Villalta score
            if (score >= 15) {
                resultCard.classList.remove('d-none', 'bg-warning', 'bg-success');
                resultCard.classList.add('bg-danger');
                resultText.innerText = `Your Villalta Score is ${score}. You have severe PTS (Post-Thrombotic Syndrome).`;
            } else if (score >= 10 && score < 15) {
                resultCard.classList.remove('d-none', 'bg-danger', 'bg-success');
                resultCard.classList.add('bg-warning');
                resultText.innerText = `Your Villalta Score is ${score}. You have moderate PTS.`;
            } else if (score >= 5 && score < 10) {
                resultCard.classList.remove('d-none', 'bg-danger', 'bg-success');
                resultCard.classList.add('bg-warning');
                resultText.innerText = `Your Villalta Score is ${score}. You have mild PTS.`;
            } else {
                resultCard.classList.remove('d-none', 'bg-danger', 'bg-warning');
                resultCard.classList.add('bg-success');
                resultText.innerText = `Your Villalta Score is ${score}. You have no significant PTS.`;
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
