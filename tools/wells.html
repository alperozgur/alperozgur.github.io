<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wells Score Kalkylator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
		body {
		background-color: #f8f9fa;
		}

		h1 {
			font-size: 24px;
		}

		#result {
			font-size: 18px;
			color: #333;
		}
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header text-center">
                        <h1>Wells Score Kalkylator för DVT</h1>
                    </div>
                    <div class="card-body">
                        <form id="wellsForm">
                            <div class="form-check mb-3">
                                <input type="checkbox" class="form-check-input" id="cancer" value="1">
                                <label class="form-check-label" for="cancer">Aktiv cancer (inom de senaste 6 månaderna eller palliativ behandling)</label>
                            </div>

                            <div class="form-check mb-3">
                                <input type="checkbox" class="form-check-input" id="immobilisering" value="1">
                                <label class="form-check-label" for="immobilisering">Immobilisering eller nyligen sängliggande (>3 dagar) eller stor kirurgi inom 12 veckor</label>
                            </div>

                            <div class="form-check mb-3">
                                <input type="checkbox" class="form-check-input" id="ömhet" value="1">
                                <label class="form-check-label" for="ömhet">Ömhet längs djupa venernas väg</label>
                            </div>

                            <div class="form-check mb-3">
                                <input type="checkbox" class="form-check-input" id="svullnad" value="1">
                                <label class="form-check-label" for="svullnad">Svullnad i hela benet</label>
                            </div>

                            <div class="form-check mb-3">
                                <input type="checkbox" class="form-check-input" id="vadsvullnad" value="1">
                                <label class="form-check-label" for="vadsvullnad">Vadsvullnad >3 cm jämfört med andra benet</label>
                            </div>

                            <div class="form-check mb-3">
                                <input type="checkbox" class="form-check-input" id="ödem" value="1">
                                <label class="form-check-label" for="ödem">Pittingödem endast i det symtomatiska benet</label>
                            </div>

                            <div class="form-check mb-3">
                                <input type="checkbox" class="form-check-input" id="tidigareDVT" value="1">
                                <label class="form-check-label" for="tidigareDVT">Tidigare dokumenterad DVT</label>
                            </div>

                            <div class="form-check mb-3">
                                <input type="checkbox" class="form-check-input" id="alternativDiagnos" value="-2">
                                <label class="form-check-label" for="alternativDiagnos">Alternativ diagnos minst lika sannolik som DVT</label>
                            </div>

                            <button type="button" class="btn btn-primary w-100" onclick="calculateScore()">Beräkna Wells Score</button>
                        </form>

                        <div class="mt-4">
                            <div id="resultCard" class="card text-center d-none">
                                <div id="result" class="card-body fw-bold"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
		function calculateScore() {
			let score = 0;

			// Hämta alla checkboxar och summera poängen
			score += document.getElementById('cancer').checked ? 1 : 0;
			score += document.getElementById('immobilisering').checked ? 1 : 0;
			score += document.getElementById('ömhet').checked ? 1 : 0;
			score += document.getElementById('svullnad').checked ? 1 : 0;
			score += document.getElementById('vadsvullnad').checked ? 1 : 0;
			score += document.getElementById('ödem').checked ? 1 : 0;
			score += document.getElementById('tidigareDVT').checked ? 1 : 0;
			score += document.getElementById('alternativDiagnos').checked ? -2 : 0;

			// Hämta kortet och textinnehållet för resultatet
			let resultCard = document.getElementById('resultCard');
			let resultText = document.getElementById('result');

			// Baserat på poäng, ändra färg och text
			if (score >= 2) {
				resultCard.classList.remove('d-none', 'bg-warning', 'bg-success');
				resultCard.classList.add('bg-danger');
				resultText.innerText = `Wells Score: ${score}. Hög sannolikhet för DVT.`;
			} else {
				resultCard.classList.remove('d-none', 'bg-danger', 'bg-warning');
				resultCard.classList.add('bg-success');
				resultText.innerText = `Wells Score: ${score}. Låg sannolikhet för DVT.`;
			}
		}
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
