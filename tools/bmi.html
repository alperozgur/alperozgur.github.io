<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card mt-5">
                    <div class="card-body">
                        <h1 class="card-title text-center">BMI Calculator</h1>
                        <div class="form-group">
                            <label for="weight">Weight in kg:</label>
                            <input type="number" class="form-control" id="weight" placeholder="Enter weight">
                        </div>
                        <div class="form-group">
                            <label for="height">Height in cm:</label>
                            <input type="number" class="form-control" id="height" placeholder="Enter height">
                        </div>
                        <button class="btn btn-primary btn-block" onclick="calculateBMI()">Calculate BMI</button>
                        <div class="result mt-3 text-center" id="result"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateBMI() {
            let weight = document.getElementById('weight').value;
            let heightInCm = document.getElementById('height').value;
            
            if (weight > 0 && heightInCm > 0) {
                let heightInMeters = heightInCm / 100;
                let bmi = weight / (heightInMeters * heightInMeters);
                document.getElementById('result').innerText = 'Your BMI is ' + bmi.toFixed(2);
            } else {
                document.getElementById('result').innerText = 'Please enter valid weight and height';
            }
        }
    </script>
</body>
</html>
