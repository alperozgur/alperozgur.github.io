<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Kalkylator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        h1 {
			font-size: 24px;
		}
        #resultCard {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header text-center">
                        <h1>BMI Kalkylator</h1>
                    </div>
                    <div class="card-body">
                        <form id="bmiForm">
                            <div class="mb-3">
                                <label for="weight" class="form-label">Vikt (kg)</label>
                                <input type="number" class="form-control" id="weight" placeholder="Ange din vikt i kg" required>
                            </div>

                            <div class="mb-3">
                                <label for="height" class="form-label">Längd (cm)</label>
                                <input type="number" class="form-control" id="height" placeholder="Ange din längd i cm" required>
                            </div>

                            <button type="button" class="btn btn-primary w-100" onclick="calculateBMI()">Beräkna BMI</button>
                        </form>

                        <div class="mt-4">
                            <div id="resultCard" class="card text-center d-none">
                                <div id="result" class="card-body fw-bold"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateBMI() {
            // Hämta vikt och längd från formuläret
            let weight = parseFloat(document.getElementById('weight').value);
            let height = parseFloat(document.getElementById('height').value) / 100; // Omvandla cm till meter

            // Beräkna BMI
            let bmi = weight / (height * height);

            // Hämta resultatkortet och textinnehållet
            let resultCard = document.getElementById('resultCard');
            let resultText = document.getElementById('result');

            // Baserat på BMI, ändra färg och text
            if (bmi < 18.5) {
                resultCard.classList.remove('d-none', 'bg-warning', 'bg-success', 'bg-danger');
                resultCard.classList.add('bg-warning');
                resultText.innerText = `Ditt BMI är ${bmi.toFixed(1)}. Du är underviktig.`;
            } else if (bmi >= 18.5 && bmi < 24.9) {
                resultCard.classList.remove('d-none', 'bg-warning', 'bg-danger');
                resultCard.classList.add('bg-success');
                resultText.innerText = `Ditt BMI är ${bmi.toFixed(1)}. Du har en normalvikt.`;
            } else if (bmi >= 25 && bmi < 29.9) {
                resultCard.classList.remove('d-none', 'bg-success', 'bg-danger');
                resultCard.classList.add('bg-warning');
                resultText.innerText = `Ditt BMI är ${bmi.toFixed(1)}. Du är överviktig.`;
            } else {
                resultCard.classList.remove('d-none', 'bg-warning', 'bg-success');
                resultCard.classList.add('bg-danger');
                resultText.innerText = `Ditt BMI är ${bmi.toFixed(1)}. Du har fetma.`;
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
