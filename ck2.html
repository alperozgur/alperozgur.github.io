<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Link Parser</title>
<style>
@import url(https://fonts.googleapis.com/css?family=Roboto:400,500,700,300,100);

body {
  background-color: #ffffff;
  font-family: "Roboto", helvetica, arial, sans-serif;
  font-size: 12px;
  font-weight: 400;
  text-rendering: optimizeLegibility;
}

div.table-title {
  display: block;
  margin: auto;
  max-width: 600px;
  padding:5px;
  width: 100%;
}

.table-title h3 {
   color: #fafafa;
   font-size: 30px;
   font-weight: 400;
   font-style:normal;
   font-family: "Roboto", helvetica, arial, sans-serif;
   text-shadow: -1px -1px 1px rgba(0, 0, 0, 0.1);
   text-transform:uppercase;
}


/*** Table Styles **/

.table-fill {
  background: white;
  border-radius:3px;
  border-collapse: collapse;
  height: 320px;
  margin: auto;
  max-width: 600px;
  padding:5px;
  width: 100%;
  box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
  animation: float 5s infinite;
}
 
th {
  color:#D5DDE5;;
  background:#1b1e24;
  border-bottom:4px solid #9ea7af;
  border-right: 1px solid #343a45;
  font-size:23px;
  font-weight: 100;
  padding:24px;
  text-align:left;
  text-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
  vertical-align:middle;
}

th:first-child {
  border-top-left-radius:3px;
}
 
th:last-child {
  border-top-right-radius:3px;
  border-right:none;
}
  
tr {
  border-top: 1px solid #C1C3D1;
  border-bottom-: 1px solid #C1C3D1;
  color:#666B85;
  font-size:16px;
  font-weight:normal;
  text-shadow: 0 1px 1px rgba(256, 256, 256, 0.1);
}
 
tr:hover td {
  background:#4E5066;
  color:#FFFFFF;
  border-top: 1px solid #22262e;
}
 
tr:first-child {
  border-top:none;
}

tr:last-child {
  border-bottom:none;
}
 
tr:nth-child(odd) td {
  background:#EBEBEB;
}
 
tr:nth-child(odd):hover td {
  background:#4E5066;
}

tr:last-child td:first-child {
  border-bottom-left-radius:3px;
}
 
tr:last-child td:last-child {
  border-bottom-right-radius:3px;
}
 
td {
  background:#FFFFFF;
  padding:20px;
  text-align:left;
  vertical-align:middle;
  font-weight:300;
  font-size:18px;
  text-shadow: -1px -1px 1px rgba(0, 0, 0, 0.1);
  border-right: 1px solid #C1C3D1;
}

td:last-child {
  border-right: 0px;
}

th.text-left {
  text-align: left;
}

th.text-center {
  text-align: center;
}

th.text-right {
  text-align: right;
}

td.text-left {
  text-align: left;
}

td.text-center {
  text-align: center;
}

td.text-right {
  text-align: right;
}

    
</style>
</head>
<body>

<h1>RSS Link Parser</h1>
<table id="rssTable">
  <thead>
    <tr>
      <th>Article</th>
      <th>Download Link</th>
    </tr>
  </thead>
  <tbody>
    <!-- Table body will be filled dynamically using JavaScript -->
  </tbody>
</table>

<script>
  // Function to fetch and parse the RSS feed
  function parseRSS(url, callback) {
    fetch(url)
      .then(response => response.text())
      .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
      .then(data => {
        const items = data.querySelectorAll("item");
        const parsedItems = Array.from(items).map(item => ({
          title: item.querySelector("title").textContent,
          link: item.querySelector("link").textContent
        }));
        callback(parsedItems);
      })
      .catch(error => console.log("Error fetching RSS feed: ", error));
  }

  // Function to populate the table with RSS feed items
  function populateTable(items) {
    const tableBody = document.querySelector("#rssTable tbody");
    tableBody.innerHTML = ""; // Clear existing table rows
    items.forEach(item => {
      const row = document.createElement("tr");
      const titleCell = document.createElement("td");
      titleCell.textContent = item.title;
      const linkCell = document.createElement("td");
      const downloadLink = document.createElement("a");
      downloadLink.textContent = "Download";
      downloadLink.href = item.link;
      linkCell.appendChild(downloadLink);
      row.appendChild(titleCell);
      row.appendChild(linkCell);
      tableBody.appendChild(row);
    });
  }

  // URL of the RSS feed
  const rssUrl = "https://cdn.clinicalkey.com/rss/issue/10785884.xml";

  // Call the parseRSS function with the URL and populate the table
  parseRSS(rssUrl, populateTable);
</script>

</body>
</html>
